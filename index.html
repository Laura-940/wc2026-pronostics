<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MonP'titProno ⚽</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--border:#2a2a3a;--border2:#3a3a50;
  --text:#f0f0f5;--muted:#6b6b85;--muted2:#9090aa;
  --neon:#00ff87;--neon2:#00cc6a;--neon-dim:#00ff8722;
  --yellow:#ffe600;--yellow-dim:#ffe60020;
  --red:#ff4560;--red-dim:#ff456020;
  --blue:#4080ff;--blue-dim:#4080ff20;
  --orange:#ff9500;--orange-dim:#ff950020;
  --r:14px;--rs:8px;
}
html{background:var(--bg)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.app{max-width:480px;margin:0 auto;padding:0 0 84px;min-height:100vh}

/* HEADER */
.hdr{padding:18px 16px 0;display:flex;align-items:center;justify-content:space-between}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-logo{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#00ff87,#4080ff);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 0 20px var(--neon-dim)}
.hdr-title{font-size:18px;font-weight:900;letter-spacing:-.4px}
.hdr-title span{color:var(--neon)}
.hdr-sub{font-size:10px;color:var(--muted);margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:6px}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--neon-dim),var(--blue-dim));border:1.5px solid var(--neon);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--neon);flex-shrink:0}

/* HERO */
.hero{margin:14px 16px 0;background:linear-gradient(135deg,#0d1b2a,#1a1035);border:1px solid var(--border2);border-radius:var(--r);padding:16px;overflow:hidden;position:relative}
.hero::after{content:'';position:absolute;top:-30px;right:-30px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,#00ff8715,transparent 70%)}
.hero-row{display:flex;align-items:center;justify-content:space-between}
.hero-left{}
.hero-pill{display:inline-flex;align-items:center;gap:5px;background:var(--neon-dim);border:1px solid var(--neon);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;color:var(--neon);margin-bottom:8px}
.hero-title{font-size:24px;font-weight:900;letter-spacing:-.5px;line-height:1.1}
.hero-title span{color:var(--neon)}
.hero-dates{font-size:11px;color:var(--muted);margin-top:6px}
.hero-trophy{font-size:48px;position:relative;z-index:1}
.hero-stats{display:flex;gap:16px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.hstat{text-align:center}
.hstat-val{font-size:16px;font-weight:800;color:var(--text)}
.hstat-lbl{font-size:10px;color:var(--muted);margin-top:1px}

/* SECTION TODAY */
.section{padding:16px 16px 0}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title{font-size:12px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em}
.see-all{font-size:12px;font-weight:600;color:var(--neon);background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;padding:0}

/* TABS */
.tabs-wrap{padding:14px 16px 0;position:sticky;top:0;z-index:50;background:var(--bg);padding-bottom:4px}
.tabs{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);padding:4px;border-radius:var(--r)}
.tab{flex:1;padding:8px 2px;border:none;background:transparent;cursor:pointer;font-size:11px;font-weight:600;border-radius:var(--rs);color:var(--muted);transition:all .2s;font-family:'Inter',sans-serif;white-space:nowrap}
.tab.on{background:var(--surface2);color:var(--neon);border:1px solid var(--neon);box-shadow:0 0 12px var(--neon-dim)}

/* FILTERS */
.filters{display:flex;gap:6px;overflow-x:auto;padding:0 16px 10px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fbtn{flex-shrink:0;padding:5px 12px;border:1px solid var(--border);border-radius:20px;background:var(--surface);cursor:pointer;font-size:11px;font-weight:600;color:var(--muted2);font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap}
.fbtn.on{background:var(--neon-dim);color:var(--neon);border-color:var(--neon)}
.fbtn.today-btn{border-color:var(--orange);color:var(--orange);background:var(--orange-dim)}
.fbtn.today-btn.on{background:var(--orange-dim);border-color:var(--orange)}

/* MATCH CARD */
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin:0 16px 10px;overflow:hidden;transition:border-color .2s}
.mcard.today{border-color:var(--orange);box-shadow:0 0 16px var(--orange-dim)}
.mcard.open{border-color:var(--border2)}
.mcard-top{padding:9px 14px 7px;display:flex;align-items:center;justify-content:space-between}
.mcard-left{display:flex;align-items:center;gap:7px}
.mcard-round{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.today-dot{width:6px;height:6px;border-radius:50%;background:var(--orange);box-shadow:0 0 6px var(--orange);flex-shrink:0}
.mcard-date{font-size:10px;color:var(--muted)}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.02em}
.b-open{background:var(--neon-dim);color:var(--neon);border:1px solid var(--neon)}
.b-closed{background:var(--red-dim);color:var(--red);border:1px solid var(--red)}
.b-played{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue)}
.b-today{background:var(--orange-dim);color:var(--orange);border:1px solid var(--orange)}
.mcard-teams{padding:6px 14px 8px;display:flex;align-items:center}
.team{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.team-flag{font-size:28px;line-height:1}
.team-name{font-size:12px;font-weight:700;color:var(--text);text-align:center;line-height:1.2}
.vsblock{min-width:72px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.score-live{font-size:28px;font-weight:900;letter-spacing:1px;color:var(--neon);text-shadow:0 0 20px var(--neon-dim)}
.vs-txt{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.05em}
.mcard-venue{font-size:10px;color:var(--muted);text-align:center;padding-bottom:4px}
.mcard-prono{border-top:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:8px;background:var(--surface2)}
.sinp{width:46px;height:42px;text-align:center;font-size:22px;font-weight:800;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;transition:border-color .15s;-moz-appearance:textfield}
.sinp::-webkit-inner-spin-button,.sinp::-webkit-outer-spin-button{-webkit-appearance:none}
.sinp:focus{outline:none;border-color:var(--neon);box-shadow:0 0 0 3px var(--neon-dim)}
.sinp:disabled{opacity:.3;cursor:not-allowed}
.sep{color:var(--muted);font-size:16px;font-weight:800}
.pinfo{flex:1;text-align:right;font-size:11px;color:var(--muted);line-height:1.4}
.pinfo.hit{color:var(--neon);font-weight:700}
.pinfo b{font-weight:700;color:var(--text)}

/* EMPTY STATE */
.empty-match{background:var(--surface);border:1px dashed var(--border2);border-radius:var(--r);margin:0 16px 10px;padding:20px;text-align:center;color:var(--muted);font-size:13px}

/* BUTTONS */
.btn{padding:8px 16px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--surface2);cursor:pointer;font-size:13px;font-weight:600;color:var(--text);font-family:'Inter',sans-serif;transition:all .15s}
.btn.pri{background:var(--neon);color:#000;border-color:var(--neon);font-weight:800}
.btn.pri:hover{background:var(--neon2)}
.btn.sm{padding:6px 12px;font-size:11px}
.btn.ghost{background:transparent;border-color:var(--border);color:var(--muted)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 16px 14px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px;text-align:center}
.stat-val{font-size:26px;font-weight:900;color:var(--neon)}
.stat-lbl{font-size:10px;font-weight:600;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}

/* LEADERBOARD */
.lb{margin:14px 16px 0}
.lb-row{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px}
.lb-row.top1{border-color:var(--yellow);background:linear-gradient(135deg,var(--surface),var(--yellow-dim))}
.lb-row.top2{border-color:#9ca3af}
.lb-row.top3{border-color:#cd7f32}
.lb-rank{font-size:22px;min-width:28px;text-align:center}
.lb-info{flex:1}
.lb-name{font-size:14px;font-weight:700}
.lb-sub{font-size:11px;color:var(--muted);margin-top:1px}
.lb-pts{font-size:24px;font-weight:900;color:var(--neon);text-align:right}
.lb-pts-lbl{font-size:10px;color:var(--muted);text-align:right}
.lb-me{border-color:var(--neon) !important;box-shadow:0 0 12px var(--neon-dim)}

/* MY PRONOS */
.mycard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin:0 16px 8px;padding:13px 14px}
.mycard-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.mycard-match{font-size:13px;font-weight:700}
.mycard-meta{font-size:11px;color:var(--muted)}

/* ALL */
.allcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin:0 16px 10px;padding:14px}
.allcard-title{font-size:13px;font-weight:700;margin-bottom:4px}
.allcard-res{font-size:11px;color:var(--muted);margin-bottom:9px}
.pronos-list{display:flex;flex-wrap:wrap;gap:6px}
.ptag{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.ptag.hit{background:var(--neon-dim);border-color:var(--neon);color:var(--neon)}

/* LOGIN */
.login-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.login-logo{width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,var(--neon),var(--blue));display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:20px;box-shadow:0 0 40px var(--neon-dim)}
.login-brand{font-size:30px;font-weight:900;text-align:center;letter-spacing:-.5px;margin-bottom:4px}
.login-brand span{color:var(--neon)}
.login-sub{font-size:14px;color:var(--muted);text-align:center;margin-bottom:28px;line-height:1.5}
.login-card{width:100%;max-width:340px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--muted2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
input[type=text],input[type=password]{width:100%;padding:13px 14px;border:1px solid var(--border2);border-radius:var(--rs);font-size:16px;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);transition:border-color .15s}
input:focus{outline:none;border-color:var(--neon);box-shadow:0 0 0 3px var(--neon-dim)}
.err-msg{padding:10px 14px;background:var(--red-dim);color:var(--red);border:1px solid var(--red);border-radius:var(--rs);font-size:13px;font-weight:600;margin-bottom:12px}

/* NOTE */
.note{font-size:12px;color:var(--muted);padding:8px 12px;background:var(--surface);border-left:2px solid var(--neon);border-radius:0 var(--rs) var(--rs) 0;margin:0 16px 12px}

/* MISC */
.empty{text-align:center;padding:48px 24px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px;display:block;opacity:.5}
.empty-text{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--muted2)}
.empty-sub{font-size:13px}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:40px;font-size:13px;font-weight:700;z-index:999;animation:ti .2s ease;white-space:nowrap}
.ts{background:var(--neon);color:#000;box-shadow:0 4px 20px var(--neon-dim)}
.te{background:var(--red);color:#fff;box-shadow:0 4px 20px var(--red-dim)}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.loading{text-align:center;padding:32px;color:var(--muted);font-size:14px}
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--neon);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
.week-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;padding:4px 16px 8px;margin-top:4px}

// ─── DATE HELPERS ────────────────────────────────────────────
function today(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function matchDate(m){ return new Date(m.date+'T12:00:00'); }
function isToday(m){ const t=today(),md=matchDate(m); md.setHours(0,0,0,0); return md.getTime()===t.getTime(); }
function isThisWeek(m){
  const t=today(), end=new Date(t); end.setDate(end.getDate()+7);
  const md=matchDate(m); md.setHours(0,0,0,0);
  return md>=t && md<end;
}
function getWeekGroups(matches){
  const groups={};
  for(const m of matches){
    const d=m.date;
    if(!groups[d])groups[d]=[];
    groups[d].push(m);
  }
  return Object.entries(groups).sort(([a],[b])=>a.localeCompare(b));
}
function fdate(m){
  return matchDate(m).toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
}
function fdateLong(dateStr){
  const d=new Date(dateStr+'T12:00:00');
  const today_=today(); today_.setHours(0,0,0,0);
  const dm=new Date(dateStr+'T12:00:00'); dm.setHours(0,0,0,0);
  if(dm.getTime()===today_.getTime()) return "📅 Aujourd'hui";
  const tom=new Date(today_); tom.setDate(tom.getDate()+1);
  if(dm.getTime()===tom.getTime()) return "📅 Demain";
  return d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
}

// ─── STATUS ──────────────────────────────────────────────────
function status(m){
  const now=new Date();
  const[h,mi]=m.time.split(':').map(Number);
  const mu=new Date(m.date+'T'+String(h).padStart(2,'0')+':'+String(mi).padStart(2,'0')+':00');
  mu.setHours(mu.getHours()-m.tz);
  const cut=new Date(mu-20*60*1000);
  return now<cut?'open':now<mu?'closed':'played';
}

// ─── AIRTABLE ────────────────────────────────────────────────
async function at(method,path,body){
  const r=await fetch(AT+path,{method,headers:{'Authorization':'Bearer '+AT_TOKEN,'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});
  const d=await r.json();
  if(!r.ok)throw new Error(d.error?.message||'Erreur '+r.status);
  return d;
}

async function loadAll(){
  S.loading=true;render();
  try{
    let off='',recs=[];
    do{ const d=await at('GET','Pronostics?pageSize=100'+(off?'&offset='+off:''));recs=recs.concat(d.records||[]);off=d.offset||''; }while(off);
    S.pronos={};
    for(const r of recs){ const f=r.fields; if(!S.pronos[f.MatchId])S.pronos[f.MatchId]={}; S.pronos[f.MatchId][f.Pseudo]={s1:f.Score1,s2:f.Score2,pts:f.Points||0,rid:r.id}; }
    const rd=await at('GET','Resultats?pageSize=200');
    S.results={};
    for(const r of (rd.records||[])){ const f=r.fields; S.results[f.MatchId]={s1:f.Score1,s2:f.Score2,rid:r.id}; }
    buildLB();
  }catch(e){toast(e.message,'e');}
  S.loading=false;render();
}

async function saveProno(mid){
  const s1=parseInt(S.inp[mid+'_1']),s2=parseInt(S.inp[mid+'_2']);
  if(isNaN(s1)||isNaN(s2)||s1<0||s2<0){toast('Score invalide ❌','e');return;}
  const m=M.find(x=>x.id===mid);
  if(!m||status(m)!=='open'){toast('Votes clôturés 🔒','e');return;}
  S.lm=mid;render();
  try{
    const ex=S.pronos[mid]?.[S.pseudo];
    if(ex?.rid){ await at('PATCH','Pronostics/'+ex.rid,{fields:{Score1:s1,Score2:s2}}); }
    else{ await at('POST','Pronostics',{records:[{fields:{MatchId:mid,Pseudo:S.pseudo,Score1:s1,Score2:s2,Points:0}}]}); }
    if(!S.pronos[mid])S.pronos[mid]={};
    S.pronos[mid][S.pseudo]={s1,s2,pts:ex?.pts||0,rid:ex?.rid};
    delete S.inp[mid+'_1'];delete S.inp[mid+'_2'];
    toast('Prono enregistré ✓','s');
  }catch(e){toast(e.message,'e');}
  S.lm=null;render();
}

function buildLB(){
  const pts={},nb={};
  for(const[,bp]of Object.entries(S.pronos)) for(const[ps,p]of Object.entries(bp)){ pts[ps]=(pts[ps]||0)+(p.pts||0); nb[ps]=(nb[ps]||0)+1; }
  S.lb=Object.entries(pts).map(([p,pt])=>({p,pt,nb:nb[p]||0})).sort((a,b)=>b.pt-a.pt||b.nb-a.nb);
}

function rMatches(){
  const filters=[
    {id:'week',label:'Cette semaine 📅'},
    {id:'open',label:'À pronostiquer 🎯'},
    {id:'all',label:'Tous les matchs'},
    ...GROUPS.map(g=>({id:g,label:rl(g)}))
  ];

  let filtered;
  if(S.filter==='week') filtered=M.filter(m=>isThisWeek(m));
  else if(S.filter==='open') filtered=M.filter(m=>status(m)==='open');
  else if(S.filter==='all') filtered=M;
  else filtered=M.filter(m=>m.g===S.filter);

  // Grouper par date si vue semaine
  let content='';
  if(S.filter==='week'||S.filter==='all'){
    if(!filtered.length){
      content=`<div class="empty-match">Aucun match cette semaine 😴</div>`;
    } else {
      const groups=getWeekGroups(filtered);
      content=groups.map(([date,matches])=>`
        <div class="week-label">${fdateLong(date)}</div>
        ${matches.map(m=>rCard(m)).join('')}
      `).join('');
    }
  } else {
    content=filtered.length
      ? filtered.map(m=>rCard(m)).join('')
      : `<div class="empty-match">Aucun match dans cette catégorie</div>`;
  }

  return `
    <div class="filters">
      ${filters.map(f=>`<button class="fbtn ${S.filter===f.id?'on':''}" onclick="sf('${f.id}')">${f.label}</button>`).join('')}
    </div>
    ${content}`;
}

  const pinf=p

  const inp=st==='open'?`

      ${loading?'<span class="spin" style="width:14px;height:14px;border-width:2px;margin:0"></span>':p?'Modifier':'Valider'}

  return `<div class="mcard ${tod&&st==='open'?'today':st==='open'?'open':''}">
    <div class="mcard-top">
      <div class="mcard-left">
        ${tod?'<span class="today-dot"></span>':''}

    </div>
    <div class="mcard-venue">${m.v}</div>
    <div class="mcard-prono">${inp}${pinf}</div>
  </div>`;
}

        <div class="mycard-hdr">
          <span class="mycard-match">${ff(m.t1)} ${m.t1} vs ${m.t2} ${ff(m.t2)}</span>
          ${ok?'<span class="badge b-open">🎯 +3</span>':st==='played'?'<span class="badge" style="background:var(--surface2);border-color:var(--border);color:var(--muted)">0 pt</span>':'<span class="badge b-played">En attente</span>'}
        </div>
        <div class="mycard-meta">${fdate(m)} · Prono : <b style="color:var(--text)">${p.s1}-${p.s2}</b>${r?` · Résultat : <b style="color:${ok?'var(--neon)':'var(--red)'}">${r.s1}-${r.s2}</b>`:''}</div>
      </div>`;
    }).join('')}`;
}

function rAll(){
  const vis=M.filter(m=>status(m)!=='open');
  if(!vis.length)return`<div class="empty"><span class="empty-icon">🕐</span><div class="empty-text">Trop tôt !</div><div class="empty-sub">Les pronos apparaissent après la clôture des votes (20 min avant le match)</div></div>`;
  const hasPronos=vis.some(m=>Object.keys(S.pronos[m.id]||{}).length>0);
  if(!hasPronos)return`<div class="empty"><span class="empty-icon">👥</span><div class="empty-text">Aucun prono visible</div><div class="empty-sub">Les pronos apparaîtront ici après la clôture des votes</div></div>`;
  return`<div class="note" style="margin-top:14px">Visibles après clôture · 20 min avant le coup d'envoi</div>`+
    vis.filter(m=>Object.keys(S.pronos[m.id]||{}).length).map(m=>{
      const bp=S.pronos[m.id]||{},r=S.results[m.id];
      return`<div class="allcard">
        <div class="allcard-title">${ff(m.t1)} ${m.t1} vs ${m.t2} ${ff(m.t2)}</div>
        <div class="allcard-res">${fdate(m)}${r?` · <span style="color:var(--neon);font-weight:700">${r.s1}-${r.s2}</span>`:' · En attente du résultat'}</div>
        <div class="pronos-list">${Object.entries(bp).map(([ps,p])=>{const ok=r&&p.s1===r.s1&&p.s2===r.s2;return`<span class="ptag ${ok?'hit':''}">${ps} : ${p.s1}-${p.s2}${ok?' 🎯':''}</span>`;}).join('')}</div>
      </div>`;
    }).join('');
}

function rLB(){
  if(!S.lb.length)return`<div class="empty"><span class="empty-icon">🏆</span><div class="empty-text">Classement vide</div><div class="empty-sub">Les points s'accumulent après chaque match joué !</div></div>`;
  const med=['🥇','🥈','🥉'];const cls=['top1','top2','top3'];
  return`<div class="lb">
    ${S.lb.map((r,i)=>`
      <div class="lb-row ${cls[i]||''} ${r.p===S.pseudo?'lb-me':''}">
        <span class="lb-rank">${med[i]||'#'+(i+1)}</span>
        <div class="avatar" style="${i===0?'border-color:var(--yellow);color:var(--yellow)':r.p===S.pseudo?'border-color:var(--neon)':''}">${r.p.substring(0,2).toUpperCase()}</div>
        <div class="lb-info">
          <div class="lb-name">${r.p}${r.p===S.pseudo?' <span style="font-size:10px;color:var(--neon)">(toi)</span>':''}</div>
          <div class="lb-sub">${r.nb} prono${r.nb>1?'s':''}</div>
        </div>
        <div>
          <div class="lb-pts" style="${i===0?'color:var(--yellow);text-shadow:0 0 16px var(--yellow-dim)':''}">${r.pt}</div>
          <div class="lb-pts-lbl">pts</div>
        </div>
      </div>`).join('')}
    <p style="font-size:11px;color:var(--muted);text-align:center;padding:12px 0">3 pts par score exact · Clôture 20 min avant chaque match</p>
  </div>`;
}

function rLogin(){
  return`<div class="login-page">
    <div class="login-logo">⚽</div>
    <div class="login-brand">MonP'tit<span>Prono</span></div>
    <div class="login-sub">Pronostique tous les matchs de la<br>Coupe du Monde 2026 entre amis !</div>
    <div class="login-card">
      ${S.err?`<div class="err-msg">${S.err}</div>`:''}
      <div class="fg"><label>Mot de passe du groupe</label>
        <input type="password" id="ipwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')chkPwd()" autofocus/>
      </div>
      <button class="btn pri" style="width:100%;padding:14px;font-size:15px" onclick="chkPwd()">Rejoindre le groupe →</button>
    </div>
  </div>`;
}

function rPseudo(){
  return`<div class="login-page">
    <div class="login-logo">👤</div>
    <div class="login-brand">Ton <span>pseudo</span></div>
    <div class="login-sub">Il sera affiché dans le classement<br>et ne pourra pas être changé !</div>
    <div class="login-card">
      ${S.err?`<div class="err-msg">${S.err}</div>`:''}
      <div class="fg"><label>Choisis ton pseudo</label>
        <input type="text" id="ips" placeholder="Ex: Zizou, Mbappé..." maxlength="20" onkeydown="if(event.key==='Enter')chkPseudo()" autofocus/>
      </div>
      ${S.loading
        ?`<button class="btn pri" style="width:100%;padding:14px;font-size:15px" disabled><span class="spin"></span>Vérification...</button>`
        :`<button class="btn pri" style="width:100%;padding:14px;font-size:15px" onclick="chkPseudo()">C'est parti ⚽</button>`}
      <button class="btn ghost" style="width:100%;margin-top:8px;padding:10px" onclick="S.step='login';S.err=null;localStorage.removeItem('wc_ok');render()">← Retour</button>
    </div>
  </div>`;
}

function st(t){S.tab=t;render();}
function sf(f){S.filter=f;render();}
function reload(){loadAll();}

function chkPwd(){
  const v=document.getElementById('ipwd')?.value?.trim();
  if(v!==PWD){S.err='Mot de passe incorrect ❌';render();setTimeout(()=>{S.err=null;render();},2000);return;}
  S.err=null;localStorage.setItem('wc_ok','1');S.step='pseudo';render();
}

async function chkPseudo(){
  const v=document.getElementById('ips')?.value?.trim();
  if(!v||v.length<2){S.err='Pseudo trop court (min 2 caractères)';render();return;}
  S.loading=true;S.err=null;render();
  try{
    const d=await at('GET','Pronostics?maxRecords=1&filterByFormula='+encodeURIComponent(`{Pseudo}="${v}"`));
    if(d.records?.length>0){S.loading=false;S.err='Ce pseudo est déjà pris 😅 Choisis-en un autre';render();return;}
  }catch(e){}
  S.pseudo=v;localStorage.setItem('wc_pseudo',v);S.step='app';S.loading=false;
  loadAll();
}

function toast(msg,type){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');t.className='toast t'+(type||'s');t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}

render();
if(S.step==='app')loadAll();
</script>
</body>
</html>
