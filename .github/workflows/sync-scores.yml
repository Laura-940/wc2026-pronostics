name: Sync Scores

on:
  schedule:
    - cron: '*/30 * * * *'  # toutes les 30 minutes
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync World Cup scores to Airtable
        env:
          API_FOOTBALL_TOKEN: ${{ secrets.API_FOOTBALL_TOKEN }}
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          BASE_ID: app6kZ7JVeTWarmFR
        run: |
          node << 'EOF'
          const https = require('https');

          function norm(s) {
            const aliases = {
              'ivory coast': 'cotedivoire',
              "cote d ivoire": 'cotedivoire',
              'cape verde islands': 'capvert',
              'cape verde': 'capvert',
              'congo dr': 'rdcongo',
              'dr congo': 'rdcongo',
              'scotland': 'ecosse',
              'france': 'france',
              'spain': 'espagne',
              'germany': 'allemagne',
              'netherlands': 'paysbas',
              'brazil': 'bresil',
              'morocco': 'maroc',
              'haiti': 'haiti',
              'australia': 'australie',
              'turkey': 'turquie',
              'turkiye': 'turquie',
              'switzerland': 'suisse',
              'sweden': 'suede',
              'tunisia': 'tunisie',
              'belgium': 'belgique',
              'egypt': 'egypte',
              'iran': 'iran',
              'new zealand': 'nouvellezeland',
              'norway': 'norvege',
              'senegal': 'senegal',
              'argentina': 'argentine',
              'algeria': 'algerie',
              'austria': 'autriche',
              'jordan': 'jordanie',
              'portugal': 'portugal',
              'england': 'angleterre',
              'croatia': 'croatie',
              'ghana': 'ghana',
              'panama': 'panama',
              'uzbekistan': 'ouzbekistan',
              'colombia': 'colombie',
              'ecuador': 'equateur',
              'curacao': 'curacao',
              'japan': 'japon',
              'saudi arabia': 'arabiesaoudite',
              'uruguay': 'uruguay',
              'iraq': 'irak',
              'south africa': 'afriquedusud',
              'south korea': 'coreedusud',
              'czechia': 'reptcheque',
              'czech republic': 'reptcheque',
              'canada': 'canada',
              'qatar': 'qatar',
              'mexico': 'mexique',
              'usa': 'etatsuni',
              'united states': 'etatsuni',
              'paraguay': 'paraguay',
              'bosnia and herzegovina': 'bosnieherzegovine',
              'bosnia-herzegovina': 'bosnieherzegovine',
              'bosnia herzegovina': 'bosnieherzegovine',
            };
            let r = s.toLowerCase().trim();
            for (const [k,v] of Object.entries(aliases).sort((a,b)=>b[0].length-a[0].length)) {
              if (r === k || r.includes(k)) { r = r.replace(k, v); break; }
            }
            return r
              .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
              .replace(/[^a-z0-9]/g, '');
          }

          const MATCHES = {
            m001: ['Mexico', 'South Africa'],
            m002: ['South Korea', 'Czechia'],
            m003: ['Czechia', 'South Africa'],
            m004: ['Mexico', 'South Korea'],
            m005: ['South Africa', 'South Korea'],
            m006: ['Mexico', 'Czechia'],
            m007: ['Canada', 'Bosnia and Herzegovina'],
            m008: ['Qatar', 'Switzerland'],
            m009: ['Canada', 'Qatar'],
            m010: ['Switzerland', 'Bosnia and Herzegovina'],
            m011: ['Bosnia and Herzegovina', 'Qatar'],
            m012: ['Switzerland', 'Canada'],
            m013: ['Brazil', 'Morocco'],
            m014: ['Haiti', 'Scotland'],
            m015: ['United States', 'Paraguay'],
            m016: ['Brazil', 'Haiti'],
            m017: ['Scotland', 'Morocco'],
            m018: ['Morocco', 'Haiti'],
            m019: ['Scotland', 'Brazil'],
            m020: ['Australia', 'Turkey'],
            m021: ['Turkey', 'Paraguay'],
            m022: ['United States', 'Australia'],
            m023: ['Turkey', 'United States'],
            m024: ['Paraguay', 'Australia'],
            m025: ['Germany', 'Curacao'],
            m026: ["Cote d Ivoire", 'Ecuador'],
            m027: ['Netherlands', 'Japan'],
            m028: ['Germany', "Cote d Ivoire"],
            m029: ['Ecuador', 'Curacao'],
            m030: ['Curacao', "Cote d Ivoire"],
            m031: ['Ecuador', 'Germany'],
            m032: ['Sweden', 'Tunisia'],
            m033: ['Netherlands', 'Sweden'],
            m034: ['Tunisia', 'Japan'],
            m035: ['Japan', 'Sweden'],
            m036: ['Tunisia', 'Netherlands'],
            m037: ['Spain', 'Cape Verde'],
            m038: ['Saudi Arabia', 'Uruguay'],
            m039: ['Spain', 'Saudi Arabia'],
            m040: ['Uruguay', 'Cape Verde'],
            m041: ['Cape Verde', 'Saudi Arabia'],
            m042: ['Uruguay', 'Spain'],
            m043: ['Belgium', 'Egypt'],
            m044: ['Iran', 'New Zealand'],
            m045: ['Belgium', 'Iran'],
            m046: ['New Zealand', 'Egypt'],
            m047: ['Egypt', 'Iran'],
            m048: ['New Zealand', 'Belgium'],
            m049: ['France', 'Senegal'],
            m050: ['Iraq', 'Norway'],
            m051: ['France', 'Iraq'],
            m052: ['Norway', 'Senegal'],
            m053: ['Senegal', 'Iraq'],
            m054: ['Norway', 'France'],
            m055: ['Argentina', 'Algeria'],
            m056: ['Austria', 'Jordan'],
            m057: ['Argentina', 'Austria'],
            m058: ['Jordan', 'Algeria'],
            m059: ['Algeria', 'Austria'],
            m060: ['Jordan', 'Argentina'],
            m061: ['Portugal', 'DR Congo'],
            m062: ['England', 'Croatia'],
            m063: ['Portugal', 'England'],
            m064: ['Croatia', 'DR Congo'],
            m065: ['DR Congo', 'England'],
            m066: ['Croatia', 'Portugal'],
            m067: ['Ghana', 'Panama'],
            m068: ['Uzbekistan', 'Colombia'],
            m069: ['Ghana', 'Uzbekistan'],
            m070: ['Colombia', 'Panama'],
            m071: ['Panama', 'Uzbekistan'],
            m072: ['Colombia', 'Ghana'],
          };

          const INDEX = {};
          for (const [mid, [t1, t2]] of Object.entries(MATCHES)) {
            INDEX[norm(t1) + '_' + norm(t2)] = { mid, swapped: false };
            INDEX[norm(t2) + '_' + norm(t1)] = { mid, swapped: true };
          }

          function apiFetch(path) {
            return new Promise((resolve, reject) => {
              const opts = {
                hostname: 'v3.football.api-sports.io',
                path,
                method: 'GET',
                headers: {
                  'x-apisports-key': process.env.API_FOOTBALL_TOKEN
                }
              };
              https.get(opts, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try { resolve({ status: res.statusCode, body: JSON.parse(data) }); }
                  catch (e) { resolve({ status: res.statusCode, body: data }); }
                });
              }).on('error', reject);
            });
          }

          async function atFetch(method, path, body) {
            return new Promise((resolve, reject) => {
              const data = body ? JSON.stringify(body) : null;
              const opts = {
                hostname: 'api.airtable.com',
                path: `/v0/${process.env.BASE_ID}/${path}`,
                method,
                headers: {
                  'Authorization': `Bearer ${process.env.AIRTABLE_TOKEN}`,
                  'Content-Type': 'application/json',
                  ...(data ? { 'Content-Length': Buffer.byteLength(data) } : {})
                }
              };
              const req = https.request(opts, res => {
                let d = '';
                res.on('data', chunk => d += chunk);
                res.on('end', () => { try { resolve(JSON.parse(d)); } catch(e){ resolve({}); } });
              });
              req.on('error', reject);
              if (data) req.write(data);
              req.end();
            });
          }

          function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

          async function main() {
            console.log('Fetching World Cup 2026 matches from api-football.com...');

            const res = await apiFetch('/fixtures?league=1&season=2026');

            if (res.status !== 200) {
              console.error('API error:', res.status, JSON.stringify(res.body).slice(0,500));
              process.exit(1);
            }

            const allMatches = res.body.response || [];
console.log('API status:', res.status);
console.log('API body:', JSON.stringify(res.body).slice(0, 800));
            const matches = allMatches.filter(m => m.fixture?.status?.short === 'FT');
            console.log(`Found ${matches.length} finished matches from API (total: ${allMatches.length})`);

            // Debug: affiche les 5 premiers matchs termines
            matches.slice(0,5).forEach(m => console.log(JSON.stringify({
              home: m.teams?.home?.name,
              away: m.teams?.away?.name,
              score: { home: m.goals?.home, away: m.goals?.away }
            })));

            // Recupere les resultats deja dans Airtable
            const existing = await atFetch('GET', 'Resultats?pageSize=100');
            const existingMap = {};
            for (const r of (existing.records || [])) {
              existingMap[r.fields.MatchId] = { id: r.id, s1: r.fields.Score1, s2: r.fields.Score2 };
            }

            // Recupere tous les pronos
            let pronos = [], off = '';
            do {
              const d = await atFetch('GET', `Pronostics?pageSize=100${off ? '&offset=' + off : ''}`);
              pronos = pronos.concat(d.records || []);
              off = d.offset || '';
            } while (off);
            console.log(`Found ${pronos.length} pronostics`);

            let updated = 0, created = 0, pointsUpdated = 0, matched = 0;

            for (const match of matches) {
              const home = match.teams?.home?.name || '';
              const away = match.teams?.away?.name || '';
              const key = norm(home) + '_' + norm(away);
              const entry = INDEX[key];

              if (!entry) {
                console.log(`No mapping for: "${home}" vs "${away}" (key=${key})`);
                continue;
              }
              matched++;

              const score1 = match.goals?.home;
              const score2 = match.goals?.away;
              if (score1 === null || score1 === undefined || score2 === null || score2 === undefined) continue;

              const s1 = entry.swapped ? score2 : score1;
              const s2 = entry.swapped ? score1 : score2;
              const matchId = entry.mid;

              const prev = existingMap[matchId];
              if (prev && prev.s1 === s1 && prev.s2 === s2) continue;

              console.log(`${matchId}: ${home} ${s1}-${s2} ${away}`);

              if (prev) {
                await atFetch('PATCH', `Resultats/${prev.id}`, {
                  fields: { MatchId: matchId, Score1: s1, Score2: s2 }
                });
                updated++;
              } else {
                const created_rec = await atFetch('POST', 'Resultats', {
                  records: [{ fields: { MatchId: matchId, Score1: s1, Score2: s2 } }]
                });
                existingMap[matchId] = { id: created_rec.records?.[0]?.id, s1, s2 };
                created++;
              }

              await sleep(250);

              const matchPronos = pronos.filter(p => p.fields.MatchId === matchId);
              for (const prono of matchPronos) {
                const ps1 = prono.fields.Score1; const ps2 = prono.fields.Score2;
                const exactScore = ps1 === s1 && ps2 === s2;
                const correctResult = (s1 > s2 && ps1 > ps2) || (s1 < s2 && ps1 < ps2) || (s1 === s2 && ps1 === ps2);
                const pts = correctResult ? (exactScore ? 4 : 3) : 0;
                if (prono.fields.Points !== pts) {
                  await atFetch('PATCH', `Pronostics/${prono.id}`, { fields: { Points: pts } });
                  pointsUpdated++;
                  await sleep(250);
                }
              }
            }

            console.log(`Done! Matched: ${matched}/${matches.length}, Created: ${created}, Updated: ${updated}, Points updated: ${pointsUpdated}`);
          }

          main().catch(err => { console.error(err); process.exit(1); });
          EOF
